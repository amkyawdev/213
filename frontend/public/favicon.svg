<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4AF37"/>
      <stop offset="50%" style="stop-color:#F1D592"/>
      <stop offset="100%" style="stop-color:#D4AF37"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="100" height="100" rx="20" fill="#0A0A0A"/>
  
  <!-- Border Ring -->
  <rect x="5" y="5" width="90" height="90" rx="16" fill="none" stroke="url(#goldGradient)" stroke-width="3"/>
  
  <!-- Letter B -->
  <text x="50" y="68" font-family="Playfair Display, Georgia, serif" font-size="55" font-weight="bold" fill="url(#goldGradient)" text-anchor="middle" filter="url(#glow)">B</text>
  
  <!-- Accent Dots -->
  <circle cx="75" cy="20" r="3" fill="#D4AF37" opacity="0.8"/>
  <circle cx="82" cy="27" r="2" fill="#F1D592" opacity="0.6"/>
</svg>